# EU868 region configuration for ChirpStack v4
# Adjust to match your local frequency plan.

[[regions]]
  id = "eu868"
  description = "Europe 863-870 MHz"
  common_name = "EU868"

  [regions.network]
    installation_margin = 10
    rx_window = 0
    rx1_delay = 1
    rx1_dr_offset = 0
    rx2_dr = 0
    rx2_frequency = 869525000
    rejoin_request_enabled = false
    rejoin_request_max_count_n = 0
    rejoin_request_max_time_n = 0
    rejoin_request_period = "24h0m0s"
    uplink_dwell_time_400ms = false
    downlink_dwell_time_400ms = false
    uplink_max_eirp = 16.15
    adr_disabled = false
    min_dr = 0
    max_dr = 5

  [regions.gateway]
    force_gws_private = false

  [[regions.network.extra_channels]]
    frequency = 867100000
    min_dr = 0
    max_dr = 5

  [[regions.network.extra_channels]]
    frequency = 867300000
    min_dr = 0
    max_dr = 5

  [[regions.network.extra_channels]]
    frequency = 867500000
    min_dr = 0
    max_dr = 5

  [[regions.network.extra_channels]]
    frequency = 867700000
    min_dr = 0
    max_dr = 5

  [[regions.network.extra_channels]]
    frequency = 867900000
    min_dr = 0
    max_dr = 5
