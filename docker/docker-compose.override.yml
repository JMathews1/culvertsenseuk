services:
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://20.108.184.46/api/v1"
        NEXT_PUBLIC_USE_MOCK_DATA: "false"
    image: culvertsense/dashboard:latest
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_USE_MOCK_DATA: ${USE_MOCK_DATA:-false}
    networks:
      - cs-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - api
