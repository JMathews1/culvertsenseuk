# ChirpStack gRPC-web + REST API
# Replace YOUR_DOMAIN with your actual domain name.

upstream chirpstack_backend {
    server chirpstack:8080;
}

upstream api_backend {
    server api:8000;
}

upstream dashboard_backend {
    server dashboard:3000;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (enable once TLS is confirmed working)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Dashboard (Next.js) — catch-all, serves CulvertSense UI
    location / {
        proxy_pass         http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # CulvertSense API v1 (takes priority over /api ChirpStack prefix)
    location /api/v1 {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ChirpStack gRPC-web (path prefix /api)
    location /api {
        grpc_pass grpc://chirpstack_backend;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;

        # Required for gRPC-web
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,grpc-timeout,x-grpc-web";
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }
    }

    # FastAPI application service
    location /v1 {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (unauthenticated)
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }
}
