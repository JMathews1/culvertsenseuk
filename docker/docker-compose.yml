###############################################################################
# CulvertSense — ChirpStack v4 stack
#
# All services communicate on the internal "cs-net" bridge.
# Only Nginx binds to host ports 80/443; all other host-facing ports are
# explicitly noted where present.
#
# Secrets / credentials live in .env (gitignored).  See .env.example.
###############################################################################

networks:
  cs-net:
    driver: bridge
    internal: false   # Nginx needs outbound for ACME / upstream checks

volumes:
  postgres-data:
  redis-data:
  influxdb-data:
  influxdb-config:
  mosquitto-data:
  mosquitto-log:
  chirpstack-certs:

services:

  ###########################################################################
  # PostgreSQL
  ###########################################################################
  postgres:
    image: postgres:16.3-alpine3.20
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chirpstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chirpstack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - cs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chirpstack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###########################################################################
  # Redis
  ###########################################################################
  redis:
    image: redis:7.2.5-alpine3.20
    restart: unless-stopped
    command: ["redis-server", "--save", "300", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - cs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###########################################################################
  # Mosquitto MQTT broker
  # Bound to 127.0.0.1 on the host so only local processes (gateway bridge)
  # can reach it directly.  ChirpStack and the gateway bridge reach it via
  # the Docker network alias "mosquitto".
  ###########################################################################
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    restart: unless-stopped
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "127.0.0.1:1883:1883"   # plain MQTT — localhost only
    networks:
      - cs-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t '$$SYS/#' -n -q 0 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3

  ###########################################################################
  # ChirpStack v4
  ###########################################################################
  chirpstack:
    image: chirpstack/chirpstack:4.9.0
    restart: unless-stopped
    command: ["-c", "/etc/chirpstack"]
    volumes:
      - ./config/chirpstack:/etc/chirpstack
      - chirpstack-certs:/etc/chirpstack/certs
    environment:
      POSTGRESQL__DSN: "postgres://${POSTGRES_USER:-chirpstack}:${POSTGRES_PASSWORD}@postgres/chirpstack?sslmode=disable"
      REDIS__SERVER: "redis:6379"
      API__SECRET: ${CHIRPSTACK_API_SECRET:?CHIRPSTACK_API_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - cs-net
    # gRPC API port — exposed only internally; Nginx proxies REST/gRPC-web
    expose:
      - "8080"

  ###########################################################################
  # ChirpStack Gateway Bridge — Basics Station
  ###########################################################################
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4.1.1
    restart: unless-stopped
    command: ["-c", "/etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml"]
    volumes:
      - ./config/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    ports:
      # Basics Station WebSocket endpoint — reachable from the gateway
      - "3001:3001"
    depends_on:
      - mosquitto
    networks:
      - cs-net

  ###########################################################################
  # InfluxDB v2
  ###########################################################################
  influxdb:
    image: influxdb:2.7.6-alpine
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:?INFLUXDB_ADMIN_PASSWORD is required}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-culvertsense}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-sensors}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:?INFLUXDB_ADMIN_TOKEN is required}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - cs-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  ###########################################################################
  # FastAPI application service (placeholder)
  ###########################################################################
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: culvertsense/api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-chirpstack}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-chirpstack}"
      REDIS_URL: "redis://redis:6379/1"
      INFLUXDB_URL: "http://influxdb:8086"
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-culvertsense}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-sensors}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - cs-net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  ###########################################################################
  # Nginx reverse proxy
  ###########################################################################
  nginx:
    image: nginx:1.27.0-alpine3.19
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - chirpstack
      - api
    networks:
      - cs-net
