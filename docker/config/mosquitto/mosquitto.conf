# Mosquitto configuration for CulvertSense
# Plain MQTT on 1883, accessible only within the Docker network (and via the
# host 127.0.0.1:1883 port binding in docker-compose.yml).

listener 1883
protocol mqtt

# Allow only local network connections; no anonymous access in production.
# Set allow_anonymous false and configure password_file for hardened deployments.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information

# Reasonable defaults for IoT workloads
max_queued_messages 1000
message_size_limit 65536
