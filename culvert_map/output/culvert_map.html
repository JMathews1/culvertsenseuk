<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High-Risk Culvert Crossings in England — CulvertSense</title>

<!-- Leaflet -->
<link  rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet.markercluster -->
<link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { height: 100vh; width: 100%; }

  /* ── Header panel ── */
  #header {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 1000;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
    padding: 12px 16px;
    max-width: 280px;
  }
  #header .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  #header .logo svg { flex-shrink: 0; }
  #header .brand {
    font-size: 15px;
    font-weight: 700;
    color: #1a3c5e;
    letter-spacing: -0.3px;
  }
  #header .subtitle {
    font-size: 11.5px;
    color: #555;
    line-height: 1.4;
    margin-top: 2px;
  }

  /* ── Legend / filter panel ── */
  #controls {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 1000;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
    padding: 12px 16px;
    min-width: 190px;
    max-width: 220px;
  }
  #controls h3 {
    font-size: 11px;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
    margin-top: 10px;
  }
  #controls h3:first-child { margin-top: 0; }
  .filter-section + .filter-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    cursor: pointer;
    user-select: none;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .swatch {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,.2);
  }
  .legend-label {
    font-size: 13px;
    color: #333;
  }
  .legend-count {
    font-size: 11px;
    color: #888;
    margin-left: auto;
  }
  .legend-item.disabled .swatch { opacity: 0.3; }
  .legend-item.disabled .legend-label { color: #aaa; }

  /* signal filters */
  .signal-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    cursor: pointer;
    user-select: none;
  }
  .signal-item:last-child { margin-bottom: 0; }
  .signal-item input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: #1a3c5e;
    cursor: pointer;
    flex-shrink: 0;
  }
  .signal-label {
    font-size: 12px;
    color: #333;
    line-height: 1.3;
  }
  .signal-label a {
    color: #1a3c5e;
    font-size: 10px;
    margin-left: 3px;
    text-decoration: none;
    opacity: 0.7;
  }
  .signal-label a:hover { opacity: 1; text-decoration: underline; }

  /* priority filter */
  .priority-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    cursor: pointer;
    user-select: none;
  }
  .priority-item:last-child { margin-bottom: 0; }
  .priority-item input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: #555;
    cursor: pointer;
    flex-shrink: 0;
  }
  .priority-dot { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .priority-label { font-size: 12px; color: #333; }
  .priority-count { font-size: 11px; color: #888; margin-left: auto; }

  #stats-bar {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(255,255,255,.92);
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    padding: 6px 18px;
    font-size: 12px;
    color: #444;
    white-space: nowrap;
    pointer-events: none;
  }
  #stats-bar strong { color: #1a3c5e; }

  /* ── Loading overlay ── */
  #loading {
    position: absolute;
    inset: 0;
    z-index: 2000;
    background: rgba(255,255,255,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #1a3c5e;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: #555; }

  /* ── Popup ── */
  .cs-popup h4 {
    font-size: 13px;
    font-weight: 700;
    color: #1a3c5e;
    margin-bottom: 6px;
  }
  .cs-popup table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }
  .cs-popup td {
    padding: 2px 4px;
    vertical-align: top;
  }
  .cs-popup td:first-child {
    color: #777;
    white-space: nowrap;
    padding-right: 8px;
  }
  .risk-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .risk-high   { background: #d73027; }
  .risk-medium { background: #fc8d59; color: #333; }
  .cta-link {
    display: block;
    margin-top: 10px;
    text-align: center;
    padding: 6px 12px;
    background: #1a3c5e;
    color: #fff !important;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
  }
  .cta-link:hover { background: #2a5a8e; }

  /* Attribution override */
  .leaflet-control-attribution {
    font-size: 10px !important;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading culvert crossing data…</p>
</div>

<div id="map"></div>

<!-- Header -->
<div id="header">
  <div class="logo">
    <!-- Simple wave/culvert SVG icon -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="6" fill="#1a3c5e"/>
      <path d="M4 18 Q7 12 10 18 Q13 24 16 18 Q19 12 22 18 Q24 22 24 22"
            stroke="#4db8ff" stroke-width="2" stroke-linecap="round" fill="none"/>
      <rect x="9" y="8" width="10" height="7" rx="1" stroke="#fff" stroke-width="1.5" fill="none"/>
      <path d="M9 15 Q14 11 19 15" stroke="#fff" stroke-width="1.5" fill="none"/>
    </svg>
    <span class="brand">CulvertSense</span>
  </div>
  <div class="subtitle">High-risk culvert crossings in England.<br>Roads crossing watercourses in flood-risk zones.</div>
</div>

<!-- Legend / filter -->
<div id="controls">

  <!-- Flood risk -->
  <div class="filter-section">
    <h3>Flood risk</h3>
    <div class="legend-item" id="toggle-high" onclick="toggleRisk('high')">
      <div class="swatch" style="background:#d73027"></div>
      <span class="legend-label">High risk</span>
      <span class="legend-count" id="count-high">—</span>
    </div>
    <div class="legend-item" id="toggle-medium" onclick="toggleRisk('medium')">
      <div class="swatch" style="background:#fc8d59"></div>
      <span class="legend-label">Medium risk</span>
      <span class="legend-count" id="count-medium">—</span>
    </div>
  </div>

  <!-- Priority -->
  <div class="filter-section">
    <h3>Priority (dot size)</h3>
    <label class="priority-item">
      <input type="checkbox" id="prio-12" checked onchange="applyFilters()">
      <span class="priority-dot"><svg width="12" height="12"><circle cx="6" cy="6" r="4" fill="#888" opacity=".7"/></svg></span>
      <span class="priority-label">Low (1–2)</span>
      <span class="priority-count" id="count-prio-12">—</span>
    </label>
    <label class="priority-item">
      <input type="checkbox" id="prio-3" checked onchange="applyFilters()">
      <span class="priority-dot"><svg width="16" height="16"><circle cx="8" cy="8" r="6" fill="#888" opacity=".7"/></svg></span>
      <span class="priority-label">Medium (3)</span>
      <span class="priority-count" id="count-prio-3">—</span>
    </label>
    <label class="priority-item">
      <input type="checkbox" id="prio-4" checked onchange="applyFilters()">
      <span class="priority-dot"><svg width="20" height="20"><circle cx="10" cy="10" r="8" fill="#888" opacity=".7"/></svg></span>
      <span class="priority-label">High (4)</span>
      <span class="priority-count" id="count-prio-4">—</span>
    </label>
    <label class="priority-item">
      <input type="checkbox" id="prio-5" checked onchange="applyFilters()">
      <span class="priority-dot"><svg width="26" height="26"><circle cx="13" cy="13" r="11" fill="#888" opacity=".7"/></svg></span>
      <span class="priority-label">Critical (5)</span>
      <span class="priority-count" id="count-prio-5">—</span>
    </label>
  </div>

  <!-- Signals -->
  <div class="filter-section">
    <h3>Must have signal</h3>
    <label class="signal-item">
      <input type="checkbox" id="sig-flooded" onchange="applyFilters()">
      <span class="signal-label">🌊 Flooded before</span>
    </label>
    <label class="signal-item">
      <input type="checkbox" id="sig-infra" onchange="applyFilters()">
      <span class="signal-label">⚠️ Critical infra nearby</span>
    </label>
    <label class="signal-item">
      <input type="checkbox" id="sig-housing" onchange="applyFilters()">
      <span class="signal-label">🏘️ Housing nearby</span>
    </label>
  </div>

</div>

<!-- Stats bar -->
<div id="stats-bar">
  <strong id="visible-count">—</strong> culvert crossings visible
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────────────────────
// In production these files are served from the same Azure static website origin,
// so a relative path works both locally and in Azure Blob static hosting.
const GEOJSON_URL = "culvert_crossings.geojson";
const CONTACT_URL = "https://culvertsense.com/contact";
const RISK_LABELS = { 3: "High", 2: "Medium" };

// ─────────────────────────────────────────────────────────────────────────────
// Map init
// ─────────────────────────────────────────────────────────────────────────────
const map = L.map("map", { center: [53.5, -1.5], zoom: 7 });

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:
    '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors ' +
    '&copy; <a href="https://carto.com/">CARTO</a> | ' +
    'Contains OS data &copy; Crown copyright and database right | ' +
    'EA flood data &copy; Crown copyright, OGL v3',
  subdomains: "abcd",
  maxZoom: 19,
}).addTo(map);

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
// Single cluster group — we rebuild on every filter change
const clusterGroup = L.markerClusterGroup({ chunkedLoading: true, chunkInterval: 100, maxClusterRadius: 50 });
map.addLayer(clusterGroup);

let allFeatures = [];   // { props, ll, marker } for every loaded feature

const riskVisible = { high: true, medium: true };

// Counts for UI (total, not filtered)
const totalCounts = { high: 0, medium: 0, prio12: 0, prio3: 0, prio4: 0, prio5: 0 };

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function riskKey(score) { return score >= 3 ? "high" : "medium"; }

function priorityRadius(p) { return 5 + (p - 1) * 2; }

function circleIcon(colour, radius) {
  const size = radius * 2 + 4;
  return L.divIcon({
    className: "",
    html: `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
             <circle cx="${size/2}" cy="${size/2}" r="${radius}"
                     fill="${colour}" fill-opacity="0.85" stroke="#fff" stroke-width="1.5"/>
           </svg>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -(size/2)],
  });
}

function makeIcon(key, priority) {
  return circleIcon(key === "high" ? "#d73027" : "#fc8d59", priorityRadius(priority || 1));
}

const PRIORITY_LABELS = ["", "Low", "Low-Med", "Medium", "High", "Critical"];

function buildPopup(props) {
  const key      = riskKey(props.risk_score);
  const label    = RISK_LABELS[props.risk_score] || "Unknown";
  const wc       = props.watercourse_name || "Unnamed watercourse";
  const road     = props.road_name        || "Unnamed road";
  const cls      = props.road_class       || "";
  const priority = props.priority_score   || props.risk_score || 1;
  const pLabel   = PRIORITY_LABELS[priority] || priority;

  const badges = [];
  if (props.flooded_before)  badges.push("🌊 Has flooded before");
  if (props.nearby_critical) badges.push("⚠️ Critical infra nearby");
  if (props.nearby_housing)  badges.push("🏘️ Housing nearby");

  return `<div class="cs-popup">
    <h4>${wc}</h4>
    <table>
      <tr><td>Flood risk</td><td><span class="risk-badge risk-${key}">${label}</span></td></tr>
      <tr><td>Priority</td><td><strong>${pLabel}</strong> (${priority}/5)</td></tr>
      <tr><td>Road</td><td>${road}${cls ? ' <em>(' + cls + ')</em>' : ''}</td></tr>
      ${badges.length ? `<tr><td colspan="2" style="padding-top:4px;line-height:1.8">${badges.join("<br>")}</td></tr>` : ""}
      <tr><td>Coords</td><td>${(+props.lat).toFixed(5)}, ${(+props.lon).toFixed(5)}</td></tr>
    </table>
    <a class="cta-link" href="${CONTACT_URL}" target="_blank" rel="noopener">
      Report a blocked culvert near you →
    </a>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Filter logic
// ─────────────────────────────────────────────────────────────────────────────
function getActiveFilters() {
  return {
    risk: {
      high:   riskVisible.high,
      medium: riskVisible.medium,
    },
    prio: {
      12: document.getElementById("prio-12").checked,
      3:  document.getElementById("prio-3").checked,
      4:  document.getElementById("prio-4").checked,
      5:  document.getElementById("prio-5").checked,
    },
    sig: {
      flooded: document.getElementById("sig-flooded").checked,
      infra:   document.getElementById("sig-infra").checked,
      housing: document.getElementById("sig-housing").checked,
    },
  };
}

function matchesFilters(props, f) {
  const key = riskKey(props.risk_score);
  if (!f.risk[key]) return false;

  const p = props.priority_score || 1;
  const prioKey = p <= 2 ? 12 : p;
  if (!f.prio[prioKey]) return false;

  if (f.sig.flooded && !props.flooded_before)  return false;
  if (f.sig.infra   && !props.nearby_critical) return false;
  if (f.sig.housing && !props.nearby_housing)  return false;

  return true;
}

function applyFilters() {
  const f = getActiveFilters();
  const toAdd = [];
  let visible = 0;

  for (const item of allFeatures) {
    if (matchesFilters(item.props, f)) {
      toAdd.push(item.marker);
      visible++;
    }
  }

  clusterGroup.clearLayers();
  clusterGroup.addLayers(toAdd);
  document.getElementById("visible-count").textContent = visible.toLocaleString();
}

// ─────────────────────────────────────────────────────────────────────────────
// Risk toggle (click on swatch row)
// ─────────────────────────────────────────────────────────────────────────────
function toggleRisk(key) {
  riskVisible[key] = !riskVisible[key];
  document.getElementById(`toggle-${key}`).classList.toggle("disabled", !riskVisible[key]);
  applyFilters();
}

// ─────────────────────────────────────────────────────────────────────────────
// Load GeoJSON
// ─────────────────────────────────────────────────────────────────────────────
fetch(GEOJSON_URL)
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => {
    const bounds = L.latLngBounds();

    data.features.forEach(f => {
      const p   = f.properties;
      const key = riskKey(p.risk_score);
      if (key !== "high" && key !== "medium") return;

      const coords = f.geometry.coordinates;
      const ll     = L.latLng(coords[1], coords[0]);
      const marker = L.marker(ll, { icon: makeIcon(key, p.priority_score) })
                      .bindPopup(buildPopup(p), { maxWidth: 280 });

      allFeatures.push({ props: p, ll, marker });

      // tally totals
      totalCounts[key]++;
      const pv = p.priority_score || 1;
      if (pv <= 2)     totalCounts.prio12++;
      else if (pv === 3) totalCounts.prio3++;
      else if (pv === 4) totalCounts.prio4++;
      else               totalCounts.prio5++;

      bounds.extend(ll);
    });

    // Populate count labels
    document.getElementById("count-high").textContent   = totalCounts.high.toLocaleString();
    document.getElementById("count-medium").textContent = totalCounts.medium.toLocaleString();
    document.getElementById("count-prio-12").textContent = totalCounts.prio12.toLocaleString();
    document.getElementById("count-prio-3").textContent  = totalCounts.prio3.toLocaleString();
    document.getElementById("count-prio-4").textContent  = totalCounts.prio4.toLocaleString();
    document.getElementById("count-prio-5").textContent  = totalCounts.prio5.toLocaleString();

    // Initial render — all visible
    applyFilters();

    if (bounds.isValid()) map.fitBounds(bounds, { padding: [30, 30] });
    document.getElementById("loading").style.display = "none";
  })
  .catch(err => {
    console.error("Failed to load GeoJSON:", err);
    document.getElementById("loading").innerHTML =
      `<p style="color:#c0392b;font-size:14px;">
        ⚠ Could not load culvert_crossings.geojson<br>
        <small style="color:#888">Run the pipeline first, or check the file is in the same directory as this HTML.</small>
      </p>`;
  });
</script>
</body>
</html>
